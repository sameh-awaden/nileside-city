name: Build Nileside City APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "nileside_city_godot_v0_1*.zip"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Locate and extract Godot project
        shell: bash
        run: |
          set -euo pipefail
          ZIP_FILE="$(find . -maxdepth 1 -type f -name 'nileside_city_godot_v0_1*.zip' | head -n 1)"
          if [ -z "$ZIP_FILE" ]; then
            echo "Could not find nileside_city_godot_v0_1.zip in the repository root."
            exit 1
          fi
          mkdir -p extracted
          unzip -q -o "$ZIP_FILE" -d extracted
          PROJECT_FILE="$(find extracted -type f -name project.godot | head -n 1)"
          if [ -z "$PROJECT_FILE" ]; then
            echo "The ZIP does not contain project.godot."
            exit 1
          fi
          PROJECT_DIR="$(dirname "$PROJECT_FILE")"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Project found at: $PROJECT_DIR"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Create Android debug keystore
        shell: bash
        run: |
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PATH=$HOME/.android/debug.keystore" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_USER=androiddebugkey" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD=android" >> "$GITHUB_ENV"

      - name: Export Android debug APK
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot-builds/releases/download/4.7.1-stable/Godot_v4.7.1-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot-builds/releases/download/4.7.1-stable/Godot_v4.7.1-stable_export_templates.tpz
          relative_project_path: ./${{ env.PROJECT_DIR }}/
          export_debug: true
          cache: true
          use_preset_export_path: true
          presets_to_export: Android Debug
          verbose: true

      - name: Find exported APK
        shell: bash
        run: |
          set -euo pipefail
          APK_FILE="$(find "$PROJECT_DIR" -type f -name '*.apk' | head -n 1)"
          if [ -z "$APK_FILE" ]; then
            echo "Godot finished without producing an APK."
            exit 1
          fi
          echo "APK_FILE=$APK_FILE" >> "$GITHUB_ENV"
          ls -lh "$APK_FILE"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NilesideCity-Android-Debug
          path: ${{ env.APK_FILE }}
          if-no-files-found: error
          retention-days: 30
